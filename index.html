<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesenggak Sasak</title>
  <meta name="description" content="Kumpulan sesenggak, peribahasa, pepatah, dan petuah Sasak.">
  <style>
    :root {
      --bg: #f7f3ea;
      --card: #ffffff;
      --text: #2d2418;
      --muted: #6f604e;
      --primary: #7a4f24;
      --primary-dark: #5f3d1b;
      --chip: #efe2cc;
      --border: #c9b99c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 24px;
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 56px);
      color: #4b2f15;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    input, select, button {
      font-size: 16px;
      border-radius: 10px;
    }

    input, select {
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      width: 100%;
    }

    button {
      padding: 12px 18px;
      border: 0;
      background: var(--primary);
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .status {
      text-align: center;
      color: var(--muted);
      margin: 18px 0;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 1px solid rgba(122, 79, 36, 0.08);
    }

    .sesenggak {
      font-size: 23px;
      font-weight: 700;
      color: #4b2f15;
      margin-bottom: 10px;
    }

    .line {
      margin: 6px 0;
    }

    .label {
      font-weight: 700;
    }

    .kategori {
      display: inline-block;
      margin-top: 12px;
      padding: 5px 11px;
      background: var(--chip);
      border-radius: 999px;
      font-size: 13px;
      color: #6b471f;
    }

    footer {
      text-align: center;
      margin-top: 36px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Sesenggak Sasak</h1>
      <p class="subtitle">Kumpulan peribahasa, pepatah, dan petuah Sasak</p>
    </header>

    <section class="toolbar" aria-label="Pencarian sesenggak">
      <input id="searchInput" type="search" placeholder="Cari sesenggak, arti, makna, kategori..." autocomplete="off">
      <button id="searchButton" type="button">Cari</button>
      <button id="randomButton" type="button">Acak</button>
    </section>

    <div id="status" class="status">Memuat data...</div>
    <section id="list" class="grid" aria-live="polite"></section>

    <footer>
      Data dimuat langsung dari Google Sheets.
    </footer>
  </main>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Ax3bgECT91TG6f4xSsTHOlJdRgMeATjZxUsTSsbIfPQ/gviz/tq?tqx=out:csv&sheet=Sesenggak';
    let semuaData = [];

    const elements = {
      searchInput: document.getElementById('searchInput'),
      searchButton: document.getElementById('searchButton'),
      randomButton: document.getElementById('randomButton'),
      status: document.getElementById('status'),
      list: document.getElementById('list')
    };

    async function muatSheet() {
      elements.status.textContent = 'Memuat data dari Google Sheets...';
      elements.list.innerHTML = '';

      try {
        const response = await fetch(SHEET_CSV_URL + '&_=' + Date.now());

        if (!response.ok) {
          throw new Error('Google Sheets belum bisa dibaca publik. Aktifkan Share: Anyone with the link Viewer.');
        }

        const csvText = await response.text();
        semuaData = csvKeObjek(csvText)
          .filter(item => String(item.aktif).toLowerCase() === 'true');

        tampilkanData(semuaData);
      } catch (error) {
        elements.status.textContent = 'Gagal memuat data: ' + error.message;
      }
    }

    function cariData() {
      const q = elements.searchInput.value.trim().toLowerCase();

      if (!q) {
        tampilkanData(semuaData);
        return;
      }

      const hasil = semuaData.filter(item => {
        const gabungan = [
          item.sesenggak,
          item.arti,
          item.makna,
          item.kategori,
          item.sumber
        ].join(' ').toLowerCase();

        return gabungan.includes(q);
      });

      tampilkanData(hasil);
    }

    function ambilAcak() {
      if (!semuaData.length) {
        elements.status.textContent = 'Data belum tersedia.';
        return;
      }

      const index = Math.floor(Math.random() * semuaData.length);
      tampilkanData([semuaData[index]]);
    }

    function csvKeObjek(csvText) {
      const rows = parseCsv(csvText).filter(row => row.some(cell => String(cell).trim() !== ''));

      if (rows.length < 2) {
        return [];
      }

      const headers = rows[0].map(header => String(header).trim().toLowerCase());

      return rows.slice(1).map(row => {
        const item = {};

        headers.forEach((header, index) => {
          item[header] = row[index] || '';
        });

        return {
          id: String(item.id || '').trim(),
          sesenggak: String(item.sesenggak || '').trim(),
          arti: String(item.arti || '').trim(),
          makna: String(item.makna || '').trim(),
          kategori: String(item.kategori || '').trim(),
          sumber: String(item.sumber || '').trim(),
          aktif: item.aktif
        };
      });
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === ',' && !insideQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (char === '\r' && next === '\n') {
            i++;
          }
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }

      if (value !== '' || row.length > 0) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function tampilkanData(data) {
      elements.list.innerHTML = '';

      if (!data || data.length === 0) {
        elements.status.textContent = 'Data tidak ditemukan. Pastikan sheet berisi data dan kolom aktif bernilai TRUE.';
        return;
      }

      elements.status.textContent = 'Ditemukan ' + data.length + ' data.';

      data.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';

        card.innerHTML = `
          <div class="sesenggak">${escapeHtml(item.sesenggak)}</div>
          <div class="line"><span class="label">Arti:</span> ${escapeHtml(item.arti)}</div>
          <div class="line"><span class="label">Makna:</span> ${escapeHtml(item.makna)}</div>
          ${item.sumber ? `<div class="line"><span class="label">Sumber:</span> ${escapeHtml(item.sumber)}</div>` : ''}
          ${item.kategori ? `<div class="kategori">${escapeHtml(item.kategori)}</div>` : ''}
        `;

        elements.list.appendChild(card);
      });
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    elements.searchButton.addEventListener('click', cariData);
    elements.randomButton.addEventListener('click', ambilAcak);

    elements.searchInput.addEventListener('keyup', event => {
      if (event.key === 'Enter') {
        cariData();
      }
    });

    muatSheet();
  </script>
</body>
</html>
